<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#2563eb">
<link rel="manifest" href="manifest.json">
<title>注册 - 河南工学院校园二手交易平台</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="css/style.css">
<script>tailwind.config={theme:{extend:{colors:{hngxy:{blue:'#2563eb',light:'#eff6ff',dark:'#1e40af'}}}}}</script>
</head>
<body data-page="register" class="bg-gray-50 min-h-screen flex flex-col">

<div data-nav></div>

<div class="flex-1 flex items-center justify-center px-4 py-8">
  <div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-md animate-slide-up">
    <div class="text-center mb-6">
      <img src="images/emblem.jpg" alt="校徽" class="w-16 h-16 rounded-2xl object-cover mx-auto mb-3">
      <h2 class="text-xl font-bold text-gray-800">创建账号</h2>
      <p class="text-gray-400 text-sm mt-1">加入河南工学院二手交易平台</p>
    </div>

    <form id="registerForm" class="space-y-4" onsubmit="handleRegister(event)">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">用户名</label>
        <input type="text" id="regUsername" placeholder="请输入用户名" required
          class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">手机号码</label>
        <input type="text" id="regPhone" placeholder="请输入手机号码" required
          class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">短信验证码</label>
        <div class="flex gap-2">
          <input type="text" id="regSmsCode" placeholder="请输入验证码" required maxlength="6"
            class="flex-1 px-4 py-3 border border-gray-200 rounded-xl text-sm focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition">
          <button type="button" id="sendSmsBtn" onclick="sendSms()" class="px-4 py-3 bg-blue-600 text-white rounded-xl text-sm font-medium hover:bg-blue-700 transition btn-hover whitespace-nowrap">发送验证码</button>
        </div>
        <p class="text-xs text-gray-400 mt-1">验证码将发送到手机（模拟模式：控制台查看）</p>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">登录密码</label>
        <input type="password" id="regPassword" placeholder="请设置密码" required minlength="6"
          class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">确认密码</label>
        <input type="password" id="regPassword2" placeholder="请再次输入密码" required
          class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition">
      </div>
      <p class="text-xs text-gray-400 leading-relaxed">
        注册即表示同意 <span class="text-blue-600">《用户协议》</span>和<span class="text-blue-600">《隐私政策》</span>
      </p>
      <button type="submit" class="w-full py-3 bg-blue-600 text-white rounded-xl font-medium hover:bg-blue-700 transition btn-hover">
        注册
      </button>
    </form>

    <p class="text-center text-sm text-gray-400 mt-6">
      已有账号？<a href="login.html" class="text-blue-600 hover:underline font-medium">去登录</a>
    </p>
  </div>
</div>

<div data-footer></div>

<script src="js/api.js"></script>
<script src="js/script.js"></script>
<script>
var smsCountdown = 0;

async function sendSms() {
  var phone = document.getElementById('regPhone').value.trim();
  if (!/^1[3-9]\d{9}$/.test(phone)) { showToast('请输入正确的11位手机号码', 'error'); return; }
  if (smsCountdown > 0) return;
  try {
    await apiSendSMS(phone);
    showToast('验证码已发送！请在终端/控制台查看');
    smsCountdown = 60;
    var btn = document.getElementById('sendSmsBtn');
    btn.disabled = true;
    var timer = setInterval(function(){
      smsCountdown--;
      btn.textContent = smsCountdown + 's 后重发';
      if (smsCountdown <= 0) { clearInterval(timer); btn.textContent = '发送验证码'; btn.disabled = false; }
    }, 1000);
  } catch(e) { showToast(e.message, 'error'); }
}

async function handleRegister(e) {
  e.preventDefault();
  var username = document.getElementById('regUsername').value.trim();
  var phone = document.getElementById('regPhone').value.trim();
  var password = document.getElementById('regPassword').value;
  var password2 = document.getElementById('regPassword2').value;
  var smsCode = document.getElementById('regSmsCode').value.trim();

  if (!username || !phone || !password || !password2 || !smsCode) { showToast('请填写所有字段', 'error'); return; }
  if (password.length < 6) { showToast('密码至少6位', 'error'); return; }
  if (password !== password2) { showToast('两次输入的密码不一致', 'error'); return; }
  if (!/^1[3-9]\d{9}$/.test(phone)) { showToast('请输入正确的11位手机号码', 'error'); return; }
  if (!/^\d{6}$/.test(smsCode)) { showToast('请输入6位验证码', 'error'); return; }

  var result = await registerUser(username, phone, password, smsCode);
  if (result.ok) {
    showToast('注册成功！即将跳转到登录页');
    setTimeout(function(){ window.location.href = 'login.html'; }, 1200);
  } else {
    showToast(result.msg, 'error');
  }
}
</script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){})});
}
</script>
</body>
</html>
