<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#2563eb">
<link rel="manifest" href="manifest.json">
<title>商品详情 - 河南工学院校园二手交易平台</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="css/style.css">
<script>tailwind.config={theme:{extend:{colors:{hngxy:{blue:'#2563eb',light:'#eff6ff',dark:'#1e40af'}}}}}</script>
</head>
<body data-page="detail" class="bg-gray-50 min-h-screen flex flex-col">

<div data-nav></div>

<div class="max-w-4xl mx-auto px-4 py-8 w-full" id="detailContent">
  <!-- JS 动态渲染 -->
</div>

<div data-footer></div>

<script src="js/script.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const productId = params.get('id');
const product = getProductById(productId);
const currentUser = getCurrentUser();

if (!product) {
  document.getElementById('detailContent').innerHTML = `
    <div class="text-center py-20">
      <div class="text-6xl mb-4">😕</div>
      <p class="text-xl text-gray-500">商品不存在或已下架</p>
      <a href="index.html" class="inline-block mt-4 px-6 py-2 bg-blue-600 text-white rounded-xl hover:bg-blue-700 transition">返回首页</a>
    </div>`;
} else {
  const faved = isFaved(product.id);
  const comments = getComments(product.id);
  renderDetail(product, faved, comments);
}

function renderDetail(p, faved, comments) {
  const catNames = { digital:'数码产品', book:'教材书籍', clothes:'服饰鞋包', life:'生活用品', sports:'运动器材' };
  document.getElementById('detailContent').innerHTML = `
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
      <div class="bg-gradient-to-br from-blue-50 to-indigo-50 rounded-2xl flex items-center justify-center min-h-[300px] text-7xl">
        ${categoryIcon(p.category)}
      </div>
      <div class="bg-white rounded-2xl p-6 shadow-sm">
        <h1 class="text-xl sm:text-2xl font-bold text-gray-800 mb-2">${p.name}</h1>
        <div class="text-3xl font-bold text-red-500 mb-4">¥${p.price}</div>
        <div class="flex flex-wrap gap-2 mb-4 text-sm">
          <span class="px-3 py-1 bg-blue-50 text-blue-600 rounded-full text-xs">${catNames[p.category] || p.category}</span>
          <span class="px-3 py-1 bg-gray-100 text-gray-600 rounded-full text-xs">${p.condition}</span>
          <span class="px-3 py-1 bg-gray-100 text-gray-600 rounded-full text-xs">${new Date(p.createdAt).toLocaleDateString('zh-CN')} 发布</span>
        </div>
        <div class="border-t pt-4 mb-4">
          <div class="flex items-center gap-3 mb-3">
            <div class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center text-white text-sm font-bold">${p.sellerName[0]}</div>
            <div>
              <div class="font-medium text-gray-800 text-sm">${p.sellerName}</div>
              <div class="text-xs text-gray-400">卖家</div>
            </div>
          </div>
        </div>
        <div class="flex gap-2">
          <button onclick="handleFav('${p.id}')" id="favBtn" class="px-4 py-3 rounded-xl font-medium text-sm transition btn-hover ${faved ? 'bg-red-50 text-red-500 border-2 border-red-200' : 'bg-gray-100 text-gray-600 border-2 border-gray-200'}">
            ${faved ? '❤️' : '🤍'}
          </button>
          <button onclick="handleChat('${p.id}', '${p.sellerId}', '${p.sellerName}')" class="flex-1 py-3 bg-gray-100 text-gray-700 rounded-xl font-medium text-sm hover:bg-gray-200 transition btn-hover">
            立即私聊
          </button>
          ${currentUser && currentUser.id !== p.sellerId ? `
          <button onclick="handleBuy('${p.id}')" class="flex-1 py-3 bg-red-500 text-white rounded-xl font-medium text-sm hover:bg-red-600 transition btn-hover">
            立即购买
          </button>` : ''}
        </div>
        ${!currentUser ? '<p class="text-xs text-gray-400 mt-2 text-center">登录后即可购买</p>' : ''}
      </div>
    </div>

    <div class="bg-white rounded-2xl p-6 shadow-sm mb-6">
      <h3 class="font-bold text-gray-800 mb-3">商品介绍</h3>
      <p class="text-gray-600 text-sm leading-relaxed whitespace-pre-line">${escHtml(p.desc)}</p>
    </div>

    <div class="bg-white rounded-2xl p-6 shadow-sm">
      <h3 class="font-bold text-gray-800 mb-4">留言评论（${comments.length}）</h3>
      ${currentUser ? `
      <div class="flex gap-3 mb-4">
        <input type="text" id="commentInput" placeholder="说点什么吧..." class="flex-1 px-4 py-3 border border-gray-200 rounded-xl text-sm focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition">
        <button onclick="submitComment('${p.id}')" class="px-5 py-3 bg-blue-600 text-white rounded-xl text-sm font-medium hover:bg-blue-700 transition btn-hover">发送</button>
      </div>
      ` : `<p class="text-sm text-gray-400 mb-4"><a href="login.html" class="text-blue-600">登录</a>后即可留言</p>`}
      <div id="commentList" class="space-y-3">
        ${comments.slice().reverse().map(c => `
          <div class="comment-item flex gap-3 p-3 bg-gray-50 rounded-xl">
            <div class="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center text-white text-xs font-bold flex-shrink-0">${escHtml(c.username[0])}</div>
            <div class="flex-1">
              <div class="flex items-center gap-2 mb-1">
                <span class="text-sm font-medium text-gray-700">${escHtml(c.username)}</span>
                <span class="text-xs text-gray-400">${new Date(c.createdAt).toLocaleString('zh-CN')}</span>
              </div>
              <p class="text-sm text-gray-600">${escHtml(c.text)}</p>
            </div>
          </div>
        `).join('') || '<p class="text-center text-gray-400 text-sm py-6">暂无留言，快来抢沙发吧~</p>'}
      </div>
    </div>
  `;
}

function categoryIcon(cat) {
  const icons = { digital:'💻', book:'📚', clothes:'👗', life:'🏠', sports:'⚽' };
  return icons[cat] || '📦';
}

function handleFav(pid) {
  if (!requireLogin()) return;
  const ok = toggleFav(pid);
  const btn = document.getElementById('favBtn');
  if (ok) {
    btn.className = 'flex-1 py-3 rounded-xl font-medium text-sm transition btn-hover bg-red-50 text-red-500 border-2 border-red-200';
    btn.textContent = '❤️ 已收藏';
    showToast('已收藏');
  } else {
    btn.className = 'flex-1 py-3 rounded-xl font-medium text-sm transition btn-hover bg-gray-100 text-gray-600 border-2 border-gray-200';
    btn.textContent = '🤍 收藏';
    showToast('已取消收藏');
  }
}

function handleBuy(pid) {
  if (!requireLogin()) return;
  const p = getProductById(pid);
  if (!p) { showToast('商品已不存在', 'error'); return; }
  if (!confirm(`确认购买「${p.name}」？\n\n金额：¥${p.price}\n\n资金将托管在平台，待你确认收货后打款给卖家。`)) return;
  const result = createOrder(pid);
  if (result.ok) {
    showToast('购买成功！资金已安全托管，请联系卖家发货');
    setTimeout(() => { window.location.reload(); }, 1200);
  } else {
    showToast(result.msg, 'error');
  }
}

function handleChat(pid, sellerId, sellerName) {
  if (!requireLogin()) return;
  window.location.href = `chat.html?product=${pid}&seller=${sellerId}&name=${encodeURIComponent(sellerName)}`;
}

function submitComment(pid) {
  if (!requireLogin()) return;
  const input = document.getElementById('commentInput');
  const text = input.value.trim();
  if (!text) { showToast('请输入留言内容', 'error'); return; }
  addComment(pid, text);
  input.value = '';
  showToast('留言成功');
  // 刷新评论区
  const comments = getComments(pid);
  const commentList = document.getElementById('commentList');
  commentList.innerHTML = comments.slice().reverse().map(c => `
    <div class="comment-item flex gap-3 p-3 bg-gray-50 rounded-xl">
      <div class="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center text-white text-xs font-bold flex-shrink-0">${escHtml(c.username[0])}</div>
      <div class="flex-1">
        <div class="flex items-center gap-2 mb-1">
          <span class="text-sm font-medium text-gray-700">${escHtml(c.username)}</span>
          <span class="text-xs text-gray-400">${new Date(c.createdAt).toLocaleString('zh-CN')}</span>
        </div>
        <p class="text-sm text-gray-600">${escHtml(c.text)}</p>
      </div>
    </div>
  `).join('');
}

document.getElementById('commentInput')?.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') submitComment(productId);
});
</script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){})});
}
</script>
</body>
</html>
