<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#2563eb">
<link rel="manifest" href="manifest.json">
<title>登录 - 河南工学院校园二手交易平台</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="css/style.css">
<script>tailwind.config={theme:{extend:{colors:{hngxy:{blue:'#2563eb',light:'#eff6ff',dark:'#1e40af'}}}}}</script>
</head>
<body data-page="login" class="bg-gray-50 min-h-screen flex flex-col">

<div data-nav></div>

<div class="flex-1 flex items-center justify-center px-4 py-8">
  <div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-md animate-slide-up">
    <div class="text-center mb-6">
      <img src="images/emblem.jpg" alt="校徽" class="w-16 h-16 rounded-2xl object-cover mx-auto mb-3">
      <h2 class="text-xl font-bold text-gray-800">欢迎回来</h2>
      <p class="text-gray-400 text-sm mt-1">登录你的河南工学院账号</p>
    </div>

    <form id="loginForm" class="space-y-4" onsubmit="handleLogin(event)">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">手机号</label>
        <input type="text" id="loginPhone" placeholder="请输入手机号" required
          class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">密码</label>
        <input type="password" id="loginPassword" placeholder="请输入密码" required
          class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition">
      </div>
      <button type="submit" class="w-full py-3 bg-blue-600 text-white rounded-xl font-medium hover:bg-blue-700 transition btn-hover">
        登录
      </button>
    </form>

    <p class="text-center text-sm text-gray-400 mt-6">
      没有账号？<a href="register.html" class="text-blue-600 hover:underline font-medium">去注册</a>
    </p>
  </div>
</div>

<div data-footer></div>

<script src="js/api.js"></script>
<script src="js/script.js"></script>
<script>
async function handleLogin(e) {
  e.preventDefault();
  const phone = document.getElementById('loginPhone').value.trim();
  const password = document.getElementById('loginPassword').value.trim();
  if (!phone || !password) { showToast('请填写手机号和密码', 'error'); return; }
  const result = await loginUser(phone, password);
  if (result.ok) {
    showToast('登录成功！欢迎回来');
    setTimeout(() => { window.location.href = 'index.html'; }, 800);
  } else {
    showToast(result.msg, 'error');
  }
}

</script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){})});
}
</script>
</body>
</html>
